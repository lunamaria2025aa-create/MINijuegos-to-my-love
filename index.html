<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { width: 1000px; height: 600px; position: relative; background: #fff; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
        .active { display: block; }
        
        /* Posición del pastel sobre la base */
        #cake-zone { position: absolute; top: 220px; left: 420px; width: 180px; z-index: 5; pointer-events: none; }
        
        /* Estilos de interactividad */
        .item-drag { cursor: grab; width: 50px; position: absolute; z-index: 20; }
        .barra-inferior { position: absolute; bottom: 20px; right: 20px; width: 400px; height: 100px; background: rgba(255,255,255,0.7); display: flex; gap: 10px; z-index: 30; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="inicio" class="screen active" onclick="goMap()"><img src="inicio.png" style="width:100%"></div>
        
        <div id="mapa" class="screen" onclick="goKitchen()"><img src="mapa.png" style="width:100%"></div>
        
        <div id="cocina" class="screen" style="background: url('cocina_fondo.png');">
            <img id="cake-zone" src="pastel_vainilla.png">
            <div class="barra-inferior">
                <img src="frasco_vainilla.png" onclick="setFlavor('vainilla')">
                <img src="fresa.png" class="item-drag" onmousedown="startDrag(event)">
                <img src="gato_dec1.png" class="item-drag" onmousedown="startDrag(event)">
            </div>
        </div>
    </div>

    <script>
        function goMap() { document.getElementById('inicio').classList.remove('active'); document.getElementById('mapa').classList.add('active'); }
        function goKitchen() { document.getElementById('mapa').classList.add('zoom-efect'); setTimeout(() => { document.getElementById('mapa').classList.remove('active'); document.getElementById('cocina').classList.add('active'); }, 500); }
        function setFlavor(flavor) { document.getElementById('cake-zone').src = `pastel_${flavor}.png`; }

        function startDrag(e) {
            let clone = e.target.cloneNode(true);
            clone.style.position = 'absolute';
            document.body.appendChild(clone);
            document.onmousemove = (ev) => { clone.style.left = ev.pageX - 25 + 'px'; clone.style.top = ev.pageY - 25 + 'px'; };
            document.onmouseup = () => { document.onmousemove = null; };
        }
    </script>
</body>
</html>
