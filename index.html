<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Contenedor principal que mantiene el tamaño */
        #game-container { width: 1000px; height: 600px; position: relative; background: white; border: 5px solid #ffb6c1; }
        
        .pantalla { position: absolute; width: 100%; height: 100%; display: none; }
        .activo { display: block; }

        /* Estilo de la Cocina (Tu imagen) */
        #cocina { background: url('cocina_fondo.png') no-repeat center; background-size: cover; }
        
        /* Base del pastel y elementos */
        #soporte-pastel { position: absolute; bottom: 150px; left: 600px; width: 250px; }
        #pastel-base { position: absolute; bottom: 220px; left: 630px; width: 190px; z-index: 1; }
        
        /* Barra de materiales inferior */
        .barra-materiales { 
            position: absolute; bottom: 20px; right: 20px; background: rgba(255,255,255,0.8);
            padding: 15px; border-radius: 20px; display: flex; gap: 10px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="inicio" class="pantalla activo" onclick="cambiarPantalla('mapa')">
            <img src="inicio.png" style="width:100%; height:100%;">
        </div>

        <div id="mapa" class="pantalla">
            <img src="mapa.png" style="width:100%; height:100%;">
            <div style="position:absolute; top:200px; left:300px; width:200px; height:200px; cursor:pointer;" onclick="cambiarPantalla('cocina')"></div>
        </div>

        <div id="cocina" class="pantalla">
            <img id="soporte-pastel" src="base_pastel.png">
            <img id="pastel-base" src="pastel_vainilla.png">
            
            <div class="barra-materiales">
                <img class="item" src="frasco_vainilla.png" onclick="cambiarSabor('vainilla')">
                <img class="item" src="fresa.png" draggable="true">
            </div>
        </div>
    </div>

    <script>
        function cambiarPantalla(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activo'));
            document.getElementById(id).classList.add('activo');
        }

        function cambiarSabor(sabor) {
            document.getElementById('pastel-base').src = `pastel_${sabor}.png`;
        }
    </script>
</body>
</html>
