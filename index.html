<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { width: 1000px; height: 600px; position: relative; overflow: hidden; background: white; }
        
        .pantalla { position: absolute; width: 100%; height: 100%; display: none; }
        .activo { display: block; }
        
        /* Cocina y elementos */
        #cocina { background: url('cocina_fondo.png'); background-size: cover; }
        #pastel-base { position: absolute; top: 220px; left: 420px; width: 180px; z-index: 5; }
        #glaseado-capa { position: absolute; top: 220px; left: 420px; width: 180px; z-index: 6; pointer-events: none; }
        
        /* Barra interactiva */
        .barra-inferior { position: absolute; bottom: 20px; right: 20px; background: rgba(255,255,255,0.8); padding: 15px; border-radius: 15px; display: flex; gap: 10px; }
        .draggable { cursor: grab; width: 50px; position: absolute; z-index: 10; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="inicio" class="pantalla activo"><img src="inicio.png" style="width:100%"><div style="position:absolute; top:400px; left:400px; width:200px; height:100px; cursor:pointer;" onclick="cambiarPantalla('mapa')"></div></div>
        <div id="mapa" class="pantalla"><img src="mapa.png" style="width:100%"><div style="position:absolute; top:150px; left:300px; width:300px; height:200px; cursor:pointer;" onclick="cambiarPantalla('cocina')"></div></div>
        
        <div id="cocina" class="pantalla">
            <img id="pastel-base" src="pastel_vainilla.png">
            <img id="glaseado-capa" src="">
            
            <div class="barra-inferior">
                <img src="frasco_vainilla.png" onclick="cambiarSabor('vainilla')">
                <img src="frasco_chocolate.png" onclick="cambiarSabor('chocolate')">
                <img src="fresa.png" class="draggable" onmousedown="empezarArrastre(event)">
            </div>
        </div>
    </div>

    <script>
        function cambiarPantalla(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activo'));
            document.getElementById(id).classList.add('activo');
        }
        function cambiarSabor(sabor) {
            document.getElementById('pastel-base').src = `pastel_${sabor}.png`;
        }
        function empezarArrastre(e) {
            let elemento = e.target.cloneNode(true);
            document.getElementById('cocina').appendChild(elemento);
            document.onmousemove = (ev) => {
                elemento.style.left = ev.pageX - 25 + 'px';
                elemento.style.top = ev.pageY - 25 + 'px';
            };
            document.onmouseup = () => document.onmousemove = null;
        }
    </script>
</body>
</html>
