<!DOCTYPE html>
<html>
<head>
    <style>
        body { text-align: center; font-family: sans-serif; background: #fdf; }
        .pantalla { display: none; }
        .activo { display: block; }
        #cocina-area { position: relative; width: 800px; height: 600px; margin: auto; background: url('cocina_fondo.png'); }
        #pastel-base { position: absolute; top: 200px; left: 300px; width: 200px; }
        #glaseado-capa { position: absolute; top: 200px; left: 300px; width: 200px; pointer-events: none; }
        .frasco { cursor: pointer; width: 50px; }
    </style>
</head>
<body>

    <!-- Pantalla Inicio -->
    <div id="inicio" class="pantalla activo">
        <h1>¡Bienvenida a tu Pastelería!</h1>
        <button onclick="cambiarPantalla('mapa')">JUGAR</button>
    </div>

    <!-- Pantalla Mapa -->
    <div id="mapa" class="pantalla">
        <h1>Mapa del Juego</h1>
        <button onclick="cambiarPantalla('mostrador')">Ir a la Pastelería</button>
    </div>

    <!-- Pantalla Mostrador -->
    <div id="mostrador" class="pantalla">
        <h1>Mostrador</h1>
        <button onclick="cambiarPantalla('cocina')">Ir a la Cocina</button>
    </div>

    <!-- Pantalla Cocina -->
    <div id="cocina" class="pantalla">
        <div id="cocina-area">
            <img id="pastel-base" src="pastel_vainilla.png">
            <img id="glaseado-capa" src="">
            
            <!-- Frascos -->
            <img class="frasco" src="frasco_vainilla.png" onclick="cambiarSabor('vainilla')">
            <img class="frasco" src="frasco_fresa.png" onclick="cambiarSabor('fresa')">
            <img class="frasco" src="frasco_chocolate.png" onclick="cambiarSabor('chocolate')">
        </div>
    </div>

    <script>
        function cambiarPantalla(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activo'));
            document.getElementById(id).classList.add('activo');
        }

        function cambiarSabor(sabor) {
            document.getElementById('pastel-base').src = `pastel_${sabor}.png`;
        }
    </script>
</body>
</html>
