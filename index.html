<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { width: 1000px; height: 600px; position: relative; background: #fff; overflow: hidden; }
        .screen { position: absolute; width: 100%; height: 100%; display: none; transition: transform 0.8s ease-in-out; }
        .active { display: block; }
        .zooming { transform: scale(2.5); transform-origin: 65% 50%; } /* Ajuste de zoom hacia la pastelería */

        /* 1. Botón Jugar Violeta (sobre el área que subrayaste) */
        .btn-jugar { position: absolute; top: 78%; left: 75%; width: 150px; height: 50px; background: rgba(138, 43, 226, 0.6); border-radius: 20px; cursor: pointer; border: 2px solid white; }

        /* 2. Botón "Ir a la Cocina" en el mostrador */
        .btn-cocina { position: absolute; top: 70%; left: 40%; width: 200px; height: 50px; background: rgba(255, 182, 193, 0.8); cursor: pointer; border-radius: 10px; text-align: center; line-height: 50px; font-weight: bold; }

        /* 3. Pastel sobre el soporte (posicionado donde subrayaste) */
        #pastel-fijo { position: absolute; top: 410px; left: 355px; width: 160px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="inicio" class="screen active">
            <img src="image_4faa5c.jpg" style="width:100%">
            <div class="btn-jugar" onclick="cambiarPantalla('mapa')"></div>
        </div>

        <div id="mapa" class="screen">
            <img src="image_4f9ea0.jpg" style="width:100%">
            <div style="position:absolute; top:250px; left:330px; width:150px; height:150px; cursor:pointer;" onclick="hacerZoom()"></div>
        </div>

        <div id="mostrador" class="screen">
            <img src="mostrador.png" style="width:100%">
            <div class="btn-cocina" onclick="cambiarPantalla('cocina')">IR A LA COCINA</div>
        </div>

        <div id="cocina" class="screen" style="background: url('edited-image.jpg')">
            <img id="pastel-fijo" src="pastel_vainilla.png">
        </div>
    </div>

    <script>
        function cambiarPantalla(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function hacerZoom() {
            document.getElementById('mapa').classList.add('zooming');
            setTimeout(() => cambiarPantalla('mostrador'), 800);
        }
    </script>
</body>
</html>
