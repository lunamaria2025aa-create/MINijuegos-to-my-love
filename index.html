<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { width: 1000px; height: 600px; position: relative; overflow: hidden; }

        .pantalla { position: absolute; width: 100%; height: 100%; display: none; transition: transform 0.5s ease; }
        .activo { display: block; }
        
        /* Efecto Zoom en el Mapa */
        .zoom-in { transform: scale(1.5); transition: transform 1s ease; }

        /* Posicionamiento exacto que pediste */
        #cocina { background: url('cocina_fondo.png'); background-size: cover; }
        #pastel-base { position: absolute; top: 220px; left: 420px; width: 180px; z-index: 5; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="inicio" class="pantalla activo">
            <img src="inicio.png" style="width:100%;">
            <div style="position:absolute; top:400px; left:400px; width:200px; height:100px; cursor:pointer;" onclick="cambiarPantalla('mapa')"></div>
        </div>

        <div id="mapa" class="pantalla" id="mapa-div">
            <img src="mapa.png" style="width:100%;">
            <div style="position:absolute; top:150px; left:300px; width:300px; height:200px; cursor:pointer;" onclick="hacerZoom()"></div>
        </div>

        <div id="cocina" class="pantalla">
            <img id="pastel-base" src="pastel_vainilla.png">
        </div>
    </div>

    <script>
        function cambiarPantalla(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activo'));
            document.getElementById(id).classList.add('activo');
        }

        function hacerZoom() {
            document.getElementById('mapa').classList.add('zoom-in');
            setTimeout(() => cambiarPantalla('cocina'), 800);
        }
    </script>
</body>
</html>
